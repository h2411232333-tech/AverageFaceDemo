name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 保持这个，解决 Node.js 24 的警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'  # <--- 这里改成了 8
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # 这种老项目，建议先用 assembleDebug
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        # 老项目的生成路径可能略有不同，如果这个路径找不到，我会再帮你调
        path: app/build/outputs/apk/**/*.apk
